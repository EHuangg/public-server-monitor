name: Status Check

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-api:
    runs-on: ubuntu-latest
    steps:
      - name: Check public metrics endpoint
        env:
          STATUS_API_URL: ${{ secrets.STATUS_API_URL }}
        run: |
          if [ -z "$STATUS_API_URL" ]; then
            echo "STATUS_API_URL secret is not set" >&2
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /tmp/metrics.json -w "%{http_code}" "$STATUS_API_URL")
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "API is down. HTTP $HTTP_CODE" >&2
            cat /tmp/metrics.json
            exit 1
          fi
          echo "API online"
          cat /tmp/metrics.json
