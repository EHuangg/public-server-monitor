services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.1
    container_name: server-monitor-socket-proxy
    environment:
      - CONTAINERS=1
      - INFO=1
      - VERSION=1
      - EVENTS=0
      - IMAGES=0
      - NETWORKS=0
      - VOLUMES=0
      - POST=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks:
      - monitor-internal

  collector:
    image: nicolargo/glances:latest
    container_name: server-monitor-collector
    environment:
      - GLANCES_OPT=-w
      - DOCKER_HOST=tcp://socket-proxy:2375
    depends_on:
      - socket-proxy
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks:
      - monitor-internal

  backend:
    build:
      context: ./backend
    container_name: server-monitor-backend
    environment:
      - GLANCES_BASE_URL=${GLANCES_BASE_URL:-http://collector:61208}
      - GLANCES_ENDPOINT=${GLANCES_ENDPOINT:-/api/4/all}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-3}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-5}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - MINECRAFT_HOST=${MINECRAFT_HOST:-}
      - MINECRAFT_PORT=${MINECRAFT_PORT:-25565}
      - MINECRAFT_TIMEOUT_SECONDS=${MINECRAFT_TIMEOUT_SECONDS:-2.5}
    depends_on:
      - collector
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks:
      - monitor-internal

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: server-monitor-cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - backend
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    restart: unless-stopped
    networks:
      - monitor-internal

networks:
  monitor-internal:
    driver: bridge
