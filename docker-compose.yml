services:
  collector:
    image: nicolargo/glances:latest
    container_name: server-monitor-collector
    environment:
      - GLANCES_OPT=-w
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - monitor-internal

  backend:
    build:
      context: ./backend
    container_name: server-monitor-backend
    environment:
      - GLANCES_BASE_URL=${GLANCES_BASE_URL:-http://collector:61208}
      - GLANCES_ENDPOINT=${GLANCES_ENDPOINT:-/api/3/all}
      - REQUEST_TIMEOUT_SECONDS=${REQUEST_TIMEOUT_SECONDS:-3}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-5}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - collector
    restart: unless-stopped
    networks:
      - monitor-internal

  frontend:
    build:
      context: ./frontend
    container_name: server-monitor-frontend
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://backend:8000}
      - NEXT_PUBLIC_POLL_INTERVAL_MS=${NEXT_PUBLIC_POLL_INTERVAL_MS:-5000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - monitor-internal

networks:
  monitor-internal:
    driver: bridge
